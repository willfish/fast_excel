name: Test

on:
  push:
    branches:
      - master
      - "v*"
  pull_request:

jobs:
  conventional-commits:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Resolve commit range
        id: commit-range
        env:
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            RANGE="$BASE_SHA..$HEAD_SHA"
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            RANGE="$BEFORE_SHA..$HEAD_SHA"
          else
            RANGE="$HEAD_SHA^..$HEAD_SHA"
          fi

          echo "range=$RANGE" >> "$GITHUB_OUTPUT"
      - name: Conventional commit check
        uses: cocogitto/cocogitto-action@v4.2.0
        with:
          command: check
          args: ${{ steps.commit-range.outputs.range }} --ignore-merge-commits

  test:
    needs: conventional-commits

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        ruby: [2.7, 3.1, 3.3, 3.4]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: ruby/setup-ruby@v1.314.0
        with:
          ruby-version: ${{ matrix.ruby }}

      - run: bundle config set --local without 'benchmarks'
      - run: bundle install
      - run: make
      - run: make install

      - run: rake test
      - run: rake examples
      - run: gem build uber_fast_excel.gemspec

      - name: Coverage Report by octocov
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.ruby == '3.4' }}
        uses: k1LoW/octocov-action@v1.5.1

  performance:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: ruby/setup-ruby@v1.314.0
        with:
          ruby-version: "3.4"

      - run: bundle config set --local without 'benchmarks'
      - run: bundle install
      - run: make
      - run: make install
      - run: bundle exec rake perf:validate
