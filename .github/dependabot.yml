version: 2
updates:

  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: "github-actions"
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore(deps)
